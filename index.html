    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CineWorld Luxury Edition</title>
    
    <!-- Preconnect to streaming video servers for instant playback -->
    <link rel="preconnect" href="https://commondatastorage.googleapis.com" crossorigin />
    <link rel="dns-prefetch" href="https://commondatastorage.googleapis.com" />
    
    <!-- Preconnect to high-res movie image database servers for ultra-fast posters -->
    <link rel="preconnect" href="https://image.tmdb.org" crossorigin />
    <link rel="dns-prefetch" href="https://image.tmdb.org" />
    
    <!-- Preconnect to alternative rich media servers -->
    <link rel="preconnect" href="https://images.unsplash.com" crossorigin />
    <link rel="dns-prefetch" href="https://images.unsplash.com" />
    <link rel="preconnect" href="https://images.weserv.nl" crossorigin />
    <link rel="dns-prefetch" href="https://images.weserv.nl" />
